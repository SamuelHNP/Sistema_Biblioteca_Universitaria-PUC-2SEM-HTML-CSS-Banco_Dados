<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link href="cadastro.css" rel="stylesheet"/>
</head>
<body>
    <h1>CADASTRO</h1>

    <div class="caixa-cadastro">
        <form class="formulario" id="form-cadastro-aluno">
            <div class="campo">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
            </div>

            <div class="campo">
                <label for="ra">RA:</label>
                <input type="number" id="ra" name="ra" placeholder="Digite seu RA" required>
            </div>

            <div class="campo">
                <label for="curso">Curso:</label>
                <input type="text" id="curso" name="curso" placeholder="Digite seu curso" required>
            </div>

            <div class="campo">
                <label for="cpf">CPF:</label>
                <input type="number" id="cpf" name="cpf" placeholder="Digite seu CPF" required>
            </div>

            <div class="campo">
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" placeholder="EX:(19)999575760" required>
            </div>

            <div class="campo">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$">
            </div>
            
            <div class="botoes">
                <button type="submit" class="btn">Cadastrar</button>
                <a href="tela_inicial.html" class="btn voltar">Voltar</a>
            </div>
        </form>
    </div>

    <div id="modal" class="modal">
        <div class="modal-conteudo">
        <p id="modal-texto"></p>
        <button id="btn-ok">OK</button>
        </div>
    </div>

    <script src="cadastro.js"></script>
</body>
</html>
