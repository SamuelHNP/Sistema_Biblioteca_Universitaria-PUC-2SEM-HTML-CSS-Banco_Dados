<html lang="pt-br">

                    <label for="ra">RA do Aluno:</label>
                    <input type="number" id="ra" name="ra" placeholder="Digite o RA">
                </div>

                <div class="campo">
                    <label for="codigo">Código do Livro:</label>
                    <input type="number" id="codigo" name="codigo" placeholder="Digite o código do livro">
                </div>

                <div class="botoes">
                    <button type="submit" class="btn">Confirmar</button>
                    <a href="totem_autoatendimento.html" class="btn voltar">Voltar</a>
                </div>
            </form>

            <!-- LISTA DE LIVROS DISPONÍVEIS -->
            <div id="lista-livros-container">
                <h3>Livros disponíveis:</h3>
                <ul id="lista-livros"></ul>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-conteudo">
            <p id="modal-texto"></p>
            <button id="btn-ok">OK</button>
        </div>
    </div>

    <script src="totem_retirada.js"></script>
</body>
</html>
